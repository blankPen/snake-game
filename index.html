<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="game-header">
      <h1>🐍 贪吃蛇</h1>
      <div class="header-controls">
        <button id="soundToggle" class="btn-icon" title="音效开关">🔊</button>
        <div class="difficulty-selector">
          <span class="label">难度:</span>
          <button class="difficulty-btn" data-difficulty="easy">简单</button>
          <button class="difficulty-btn active" data-difficulty="normal">普通</button>
          <button class="difficulty-btn" data-difficulty="hard">困难</button>
        </div>
      </div>
    </header>

    <main class="game-main">
      <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>

      <aside class="game-info">
        <div class="info-card">
          <h3>🎮 操作说明</h3>
          <ul>
            <li><kbd>↑</kbd> / <kbd>W</kbd> - 向上移动</li>
            <li><kbd>↓</kbd> / <kbd>S</kbd> - 向下移动</li>
            <li><kbd>←</kbd> / <kbd>A</kbd> - 向左移动</li>
            <li><kbd>→</kbd> / <kbd>D</kbd> - 向右移动</li>
            <li><kbd>空格</kbd> - 暂停/继续</li>
            <li><kbd>R</kbd> - 重新开始</li>
          </ul>
        </div>

        <div class="info-card">
          <h3>📊 分数信息</h3>
          <div class="score-display">
            <div class="score-item">
              <span class="label">当前分数:</span>
              <span id="currentScore" class="value">0</span>
            </div>
            <div class="score-item">
              <span class="label">最高分数:</span>
              <span id="highScore" class="value">0</span>
            </div>
          </div>
        </div>

        <div class="info-card">
          <h3>📱 触屏操作</h3>
          <p>在画布上滑动即可控制蛇的移动方向</p>
        </div>
      </aside>
    </main>

    <footer class="game-footer">
      <button id="startBtn" class="btn btn-primary">开始游戏</button>
      <button id="pauseBtn" class="btn btn-secondary">暂停</button>
      <button id="restartBtn" class="btn btn-warning">重新开始</button>
    </footer>
  </div>

  <!-- 游戏脚本 -->
  <script type="module">
    import { Game } from './js/Game.js';
    import { SoundManager } from './js/SoundManager.js';

    // 创建游戏和音效管理器实例
    const game = new Game();
    const soundManager = new SoundManager();

    // 显示开始界面
    game.showStartScreen();

    // DOM 元素
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const difficultyBtns = document.querySelectorAll('.difficulty-btn');
    const currentScoreEl = document.getElementById('currentScore');
    const highScoreEl = document.getElementById('highScore');
    const soundToggle = document.getElementById('soundToggle');

    // 首次用户交互时初始化音效
    const initSound = () => {
      soundManager.init();
      document.removeEventListener('click', initSound);
      document.removeEventListener('touchstart', initSound);
    };
    document.addEventListener('click', initSound);
    document.addEventListener('touchstart', initSound);

    // 音效开关
    soundToggle.addEventListener('click', () => {
      const enabled = soundManager.toggle();
      soundToggle.textContent = enabled ? '🔊' : '🔇';
    });

    // 开始游戏
    startBtn.addEventListener('click', () => {
      game.start();
      startBtn.textContent = '游戏中...';
      startBtn.disabled = true;
    });

    // 暂停/继续
    pauseBtn.addEventListener('click', () => {
      const status = game.getStatus();
      if (status === 'playing') {
        game.pause();
        pauseBtn.textContent = '继续';
      } else if (status === 'paused') {
        game.resume();
        pauseBtn.textContent = '暂停';
      }
    });

    // 重新开始
    restartBtn.addEventListener('click', () => {
      game.restart();
      startBtn.textContent = '游戏中...';
      startBtn.disabled = true;
      pauseBtn.textContent = '暂停';
    });

    // 难度切换
    difficultyBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const difficulty = btn.dataset.difficulty;
        if (game.setDifficulty(difficulty)) {
          // 更新 UI
          difficultyBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      });
    });

    // 分数显示更新（事件驱动）
    const updateScoreDisplay = (data) => {
      currentScoreEl.textContent = data.score;
      highScoreEl.textContent = data.highScore;
    };

    // 使用事件驱动替代 setInterval 轮询
    game.scoreManager.setScoreChangeListener(updateScoreDisplay);

    // 初始显示分数
    updateScoreDisplay({
      score: game.scoreManager.getScore(),
      highScore: game.scoreManager.getHighScore()
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      // 空格键开始/暂停
      if (e.key === ' ') {
        e.preventDefault();
        const status = game.getStatus();
        if (status === 'start') {
          startBtn.click();
        } else if (status === 'playing') {
          pauseBtn.click();
        } else if (status === 'paused') {
          pauseBtn.click();
        }
      }
    });
  </script>
</body>
</html>
